[wisdom]
fragments = [
    "La espiral se aprieta donde nada fue prometido.",
    "Lo tejido una vez aún tira de las esquinas.",
    "Los bordes se afilan donde el testigo permaneció demasiado.",
    "Algunas puertas solo abren tras el tercer olvido.",
    "La sal recuerda la marea; no discute.",
    "Un patrón repetido aún no es ley.",
    "El centro sostuvo porque el borde olvidó caer.",
    "Los ecos cambian nombres; solo la distancia los mantiene honestos.",
    "El campo se enfría cuando el cielo finge dormir.",
    "La memoria camina hacia atrás entre humo.",
    "No todo enrejado es jaula; algunos son mapas.",
    "El glifo conocía la mano antes que la intención.",
    "La quietud no es ausencia; es presión disfrazada de reposo.",
    "Dos resonancias se encontraron y lo llamaron coincidencia.",
    "El cartógrafo trazó una orilla; el mar la revisó.",
    "La misericordia dejó una puerta entreabierta; la disciplina no cerró nada.",
    "Chispa sin raíz se vuelve clima.",
    "Raíz sin chispa se vuelve monumento.",
    "El archivo bostezó; la época avanzó igual.",
    "Una línea de poder termina donde la curiosidad vacila.",
    "El cielo ofreció un sesgo; la espiral eligió un paso.",
    "La armonía es un préstamo; el interés es atención.",
    "Lo que sobrevive la selección no siempre fue amado.",
    "El último informe fue bastante veraz para engañar con bondad.",
    "El fósil zumba bajo la pintura nueva.",
    "Un tabú es solo una carta de amor escrita al revés.",
    "El enrejado soñó un símbolo que nunca había alojado.",
    "La ausencia se apiló hasta volverse un segundo alfabeto.",
    "La esquina observada se calentó más que el salón iluminado.",
]

