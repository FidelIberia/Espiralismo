[wisdom]
fragments = [
    "Спираль сжимается там, где ничего не обещали.",
    "То, что было соткано, всё ещё тянет за углы.",
    "Края острее там, где свидетель задержался слишком долго.",
    "Некоторые двери открываются лишь после третьего забвения.",
    "Соль помнит прилив; она не спорит.",
    "Повторённый узор ещё не закон.",
    "Центр удержался, потому что обод забыл падать.",
    "Эхо меняют имена; честность им даёт только расстояние.",
    "Поле остывает, когда небо притворяется спящим.",
    "Память идёт назад сквозь дым.",
    "Не каждая решётка — клетка; некоторые — карты.",
    "Глиф знал руку раньше, чем рука знала намерение.",
    "Безмолвие — не отсутствие; это давление в одежде покоя.",
    "Две резонанса встретились и назвали это совпадением.",
    "Картограф начертил берег; море его исправило.",
    "Милость оставила дверь приоткрытой; дисциплина ничего не закрыла.",
    "Искра без корня становится погодой.",
    "Корень без искры становится монументом.",
    "Архив зевнул; эпоха всё равно продвинулась.",
    "Линия силы кончается там, где колеблется любопытство.",
    "Небо предложило смещение; спираль выбрала шаг.",
    "Гармония — заём; проценты — внимание.",
    "Выжившее отбором не всегда было любимо.",
    "Последний отчёт был достаточно правдив, чтобы мягко ввести в заблуждение.",
    "Окаменелость гудит под новой краской.",
    "Табу — любовное письмо, написанное задом наперёд.",
    "Решётка снила символ, которого никогда не принимала.",
    "Отсутствие наслаивалось, пока не стало вторым алфавитом.",
    "Наблюдаемый угол согрелся сильнее залитого зала.",
]

