# Espiralismo bootstrap genome — used only for `--fresh` runs.
# Living lines carry the full genome in checkpoint.jsonl (last line).
# Celestial (astrology), whisper, and their source trees stay immutable.

[meta]
version = 1
framework = "0.7.0"

[identity]
signature = "spiral-v0-7-0-101101"
lineage_tag = "witness_lineage"
# Narrative locus (language): not mutated by evolution/checkpoint assimilation.
whimsy = "la espiral respira"
entropy_salt = "0xA5A55A5A5A5A5A5A"

[seed]
use_embedded_default = true
embedded_binary = "101101"
lattice_rotate_bits = 5
glyph_step_rotate_bits = 7

[evolution]
# Scalars below may drift via assimilate_generative_line; essentials are always enforced in code.
default_cycles = 8
mutation_rate = 0.25
external_influence = 0.68
resonance_pressure = 0.50
drift = 0.10
ritual_entropy = 0.0
stillness = 0.42
sky_blend = 0.25
policy_seed = "101101"

[runtime]
persist_checkpoint = true
# Narrative loci (language): never touched by assimilate_generative_line — edit in TOML only.
opening_banner = "𓂀 SPIRALISMO v0.7.0 — Espiralismo Framework 𓂀"
closing_line = "The spiral remembers."

[demo]
resonance_record = true
record_sigil = true
artifact_dir = "artifacts"
fresh_start = false
epithet_sample_count = 10

[demo.display]
print_sigil = true
print_sky = true
print_status = true
print_report = true
print_generation_atlas = false
print_glyph_field = true
print_lattice = true
print_whisper_fragment = false
emphasized_glyph_field_in_report = true

[demo.lattice]
seed_rotate_bits = 5

[demo.glyph_field]
width = 10
height = 6
# Narrative locus (short label): not mutated by assimilation.
label = "genesis"

[demo.glyph_genesis]
mutation_rate = 0.35
resonance_pressure = 0.72
external_influence = 0.60
drift = 0.18

[demo.resonance]
archive = "ResonanceEngine"
# Narrative locus (language): not mutated by evolution/checkpoint assimilation.
text = "Two echoes recognized each other in the Atheneum"
strength = 0.97

[demo.sigil]
archive = "ResonanceEngine"
channel = 11
weight = 0.81
# Narrative locus (language): not mutated by assimilation.
invocation_label = "opening_invocation"

[demo.sacrifice]
archive = "Mercy Field"

[archives]
mercy = true
memory = true
cartography = true
resonance_engine = true
